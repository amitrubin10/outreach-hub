<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מרכז שיווק בקבוצות · רב-פרויקטי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1220; --panel:#111a2e; --panel-2:#16233d; --card:#0f1a30;
    --border:#22304d; --text:#e6edf7; --muted:#8aa0c2;
    --accent:#60a5fa; --accent2:#7ca7ff; --cyan:#22d3ee;
    --success:#34d399; --warn:#f59e0b; --danger:#f87171; --purple:#a78bfa;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 80% -10%,rgba(96,165,250,.10),transparent),var(--bg);
    color:var(--text);font-family:Heebo,system-ui,Arial,sans-serif;font-size:15px;line-height:1.5;padding-bottom:40px}
  a{color:var(--accent2);text-decoration:none}
  .wrap{max-width:1100px;margin:0 auto;padding:0 16px}
  header.top{display:flex;align-items:center;gap:12px;padding:18px 0 6px;flex-wrap:wrap}
  .logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--cyan));
    display:flex;align-items:center;justify-content:center;font-size:22px}
  .brand{font-weight:800;font-size:20px}
  .brand small{display:block;font-weight:500;font-size:12px;color:var(--muted)}
  .pjtbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0 4px;padding:10px;background:var(--panel);border:1px solid var(--border);border-radius:12px}
  .pjt{background:var(--panel-2);color:var(--text);border:1px solid var(--border);padding:8px 16px;border-radius:999px;
    font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
  .pjt:hover{background:rgba(96,165,250,.10)}
  .pjt.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:var(--accent);color:#06122a}
  .pjt.add{background:transparent;color:var(--muted);font-weight:600;border-style:dashed}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 18px;border-bottom:1px solid var(--border);padding-bottom:10px}
  .tab{background:var(--panel-2);color:var(--text);border:1px solid var(--border);padding:9px 14px;border-radius:10px;
    font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
  .tab:hover{background:rgba(96,165,250,.10)}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#06122a}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .spread{justify-content:space-between}
  .grid{display:grid;gap:12px}
  @media(min-width:680px){.grid.k2{grid-template-columns:1fr 1fr}.grid.k4{grid-template-columns:repeat(4,1fr)}}
  .btn{background:var(--accent);color:#06122a;border:none;padding:9px 15px;border-radius:9px;font-family:inherit;
    font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
  .btn.ghost:hover{background:var(--panel-2)}
  .btn.sm{padding:5px 11px;font-size:12px;border-radius:8px}
  .btn.success{background:var(--success)} .btn.warn{background:var(--warn)}
  .btn.danger-o{background:transparent;color:var(--danger);border:1px solid var(--danger)}
  .chip{display:inline-flex;align-items:center;gap:5px;background:var(--panel-2);border:1px solid var(--border);
    border-radius:999px;padding:4px 11px;font-size:12px;cursor:pointer;transition:.15s;font-weight:600}
  .chip:hover{background:rgba(96,165,250,.12);border-color:var(--accent)}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700}
  .b-todo{background:rgba(245,158,11,.15);color:var(--warn)}
  .b-done{background:rgba(52,211,153,.15);color:var(--success)}
  .b-irr{background:rgba(138,160,194,.15);color:var(--muted)}
  .b-new{background:rgba(96,165,250,.15);color:var(--accent2)}
  .b-dm{background:rgba(167,139,250,.15);color:var(--purple)}
  .b-demo{background:rgba(34,211,238,.15);color:var(--cyan)}
  .b-cust{background:rgba(52,211,153,.18);color:var(--success)}
  .b-lost{background:rgba(248,113,113,.13);color:var(--danger)}
  .b-idea{background:rgba(167,139,250,.15);color:var(--purple)}
  .b-draft{background:rgba(245,158,11,.15);color:var(--warn)}
  .b-pub{background:rgba(52,211,153,.15);color:var(--success)}
  .pri-high{color:var(--danger)} .pri-med{color:var(--warn)} .pri-low{color:var(--muted)}
  input,textarea,select{width:100%;background:var(--panel-2);border:1px solid var(--border);border-radius:9px;
    color:var(--text);font-family:inherit;font-size:14px;padding:9px 11px}
  textarea{min-height:90px;resize:vertical}
  label.fl{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;font-weight:600}
  .muted{color:var(--muted)} .small{font-size:12px}
  .kpi{background:var(--panel-2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
  .kpi .v{font-size:26px;font-weight:800} .kpi .l{font-size:12px;color:var(--muted);margin-top:3px}
  .bar{height:10px;background:var(--panel-2);border-radius:999px;overflow:hidden;border:1px solid var(--border)}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--cyan))}
  .empty{text-align:center;color:var(--muted);padding:28px;font-size:14px}
  .grp-rules{font-size:12px;color:var(--warn);margin-top:6px}
  .list-item{border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:10px;background:var(--panel)}
  .ov{position:fixed;inset:0;background:rgba(3,8,20,.72);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
  .ov.on{display:flex}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:92vh;
    overflow:auto;padding:20px}
  .modal h3{margin:0 0 6px}
  .x{background:transparent;border:none;color:var(--muted);font-size:24px;cursor:pointer}
  .hr{height:1px;background:var(--border);margin:14px 0}
  .tag-x{margin-inline-start:4px;color:var(--danger);font-weight:800;cursor:pointer}
  .help{background:rgba(96,165,250,.07);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--muted);margin-bottom:14px}
  .reply{border:1px solid var(--border);border-radius:11px;padding:11px;margin-bottom:8px;background:var(--panel)}
  pre.body{white-space:pre-wrap;font-family:inherit;font-size:13px;color:var(--muted);margin:8px 0 0;overflow-wrap:anywhere;word-break:break-word}
  #syncbar:empty{display:none}
  .syncon,.syncoff{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;font-weight:600;padding:7px 12px;border-radius:10px;border:1px solid var(--border)}
  .syncon{background:rgba(52,211,153,.08);color:var(--success)}
  .syncoff{background:rgba(245,158,11,.06);color:var(--warn)}
  /* ===== נייד (≤ 600px) — נוח לעבודה מהטלפון ===== */
  @media(max-width:600px){
    .wrap{padding:0 12px}
    header.top{padding:14px 0 4px}
    .brand{font-size:18px}
    .grid.k4{grid-template-columns:1fr 1fr}      /* 2 KPIs בשורה במקום 4 */
    .kpi{padding:11px} .kpi .v{font-size:22px}
    .btn{padding:11px 15px}                        /* יעדי-מגע גדולים יותר לאצבע */
    .btn.sm{padding:8px 12px;font-size:12px}
    .tab{padding:9px 13px;font-size:13px}
    .pjt{padding:8px 14px;font-size:13px}
    .card{padding:13px}
    /* גודל גופן 16px בשדות — מונע זום אוטומטי של iOS בלחיצה */
    input,textarea,select{font-size:16px}
    .modal{padding:16px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="logo">🎯</div>
    <div class="brand">מרכז שיווק בקבוצות <small>רב-פרויקטי · כלי אישי · נשמר במחשב הזה</small></div>
  </header>

  <div id="pjtbar"></div>
  <div id="syncbar"></div>

  <div class="tabs" id="tabs">
    <button class="tab" data-t="dash">📊 דשבורד</button>
    <button class="tab" data-t="groups">👥 קבוצות</button>
    <button class="tab" data-t="posts">📌 פוסטים</button>
    <button class="tab" data-t="leads">👤 לידים</button>
    <button class="tab" data-t="templates">💬 תגובות</button>
    <button class="tab" data-t="media">📣 מדיה</button>
    <button class="tab" data-t="backup">⚙️ הגדרות</button>
  </div>

  <div id="content"></div>
</div>

<div class="ov" id="ov"><div class="modal" id="modal"></div></div>

<script>
// ============================================================
// מרכז שיווק בקבוצות — רב-פרויקטי. כלי אישי, vanilla JS, localStorage.
// כל פרויקט מחזיק: קבוצות · מילות חיפוש · תגובות · פוסטים · לידים · טיוטות.
// ============================================================
const KEY='vb_outreach_hub_v1';
const todayStr=()=>new Date().toISOString().slice(0,10);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const DEFAULT_KEYWORDS=['דמי ועד','רודף אחרי','רודפת אחרי','מי שילם','גזבר','ניהול ועד','אקסל ועד','ועד בית'];
// הודעות פרטי אישיות (גם בשימוש במיגרציה החד-פעמית למטה)
const PERSONAL_DM=[
  {kind:'private',title:'📩 פרטי — אישי',body:'היי, התוכנה נקראת VeriBayit והיא מקבלת את דף הבנק של חשבון הוועד, קוראת את התנועות ומזהה לבד מי שילם, כמה, ועל איזה חודש. ככה במקום לשבת עם אקסל ולהצליב ידנית — רואים הכל מסודר בלחיצה. הכסף לא עובר דרכי בכלל, הוא נשאר בחשבון הוועד; אני רק מזהה ומסדר.\nיש אתר עם כל הפרטים והמחירים: https://www.veribayit.com\nואם בא לך, אני יכול גם פשוט להראות לך איך זה עובד — שיחה קצרה או שיתוף מסך, מה שיותר נוח.\nכמה דירות יש בבניין שלך? ואיך את מנהלת את זה היום?'},
  {kind:'private',title:'📩 פרטי — קצר ואישי',body:'היי, קוראים לתוכנה VeriBayit. בקצרה — מחברים אותה לדף הבנק של הוועד, והיא מזהה לבד מי שילם וכמה, בלי אקסל ובלי שהכסף עובר דרך אף אחד (נשאר בחשבון הוועד).\nהכל כאן: https://www.veribayit.com — ואם בא לך, אשמח להראות לך אישית איך זה עובד 🙂\nכמה דירות בבניין שלך?'}
];
// הוכחה חברתית — גזבר אמיתי שמשתמש בתוכנה (גם בשימוש במיגרציה למטה)
const SOCIAL_PROOF=[
  {kind:'public',title:'גזבר 70 משפחות — שינה לי את החיים',body:'אני גזבר בבניין של 70 משפחות ומשתמש בתוכנה הזאת כבר חודשיים — בלי להגזים, היא שינתה לי את החיים. מה שלקח לי שעות עם אקסל לוקח היום דקות: היא מתחברת לדף הבנק ומזהה לבד מי שילם. אם בא לך, אשלח לך פרטים בפרטי 🙂'},
  {kind:'private',title:'📩 גזבר 70 משפחות (הוכחה)',body:'היי, אני גזבר בבניין של 70 משפחות ומשתמש בתוכנה הזאת (VeriBayit) כבר חודשיים — בלי להגזים, היא שינתה לי את החיים. מה שלקח שעות עם אקסל לוקח עכשיו דקות: מחברים אותה לדף הבנק של הוועד והיא מזהה לבד מי שילם, כמה, ועל איזה חודש. הכסף נשאר בחשבון הוועד.\nהכל כאן: https://www.veribayit.com\nואם בא לך, אשמח גם להראות לך אישית איך זה עובד 🙂'}
];
function vbReplies(){return [
  {id:uid(),kind:'public',title:'אמפתיה → פתרון → בפרטי ⭐',body:'מכיר את התחושה הזו טוב מדי 😅 גם אני נשברתי מהרדיפה הזו, אז בניתי כלי שמתחבר לדף הבנק ומזהה לבד מי שילם. אם בא לך — אשלח לך פרטים בפרטי 🙂'},
  {id:uid(),kind:'public',title:'קצרה במיוחד',body:'אני מרגיש אותך 🙏 יש פתרון שמתחבר לדף הבנק ומזהה אוטומטית מי שילם, בלי אקסל. רוצה שאשלח פרטים בפרטי?'},
  {id:uid(),kind:'public',title:'סיפור אישי',body:'בדיוק בגלל זה בניתי תוכנה — אני גזבר בבניין של 70 דירות ונשבר לי. מתחברת לדף הבנק ומזהה לבד מי שילם, והכסף נשאר בחשבון הוועד. אשמח לפרט בפרטי 🙏'},
  {id:uid(),kind:'public',title:'ערך-קודם',body:'יש כלי שמתחבר לדף הבנק ומזהה לבד מי שילם — בלי אקסל ובלי שהכסף עובר דרך גורם שלישי עם עמלות. אם מעניין, שלח/י לי הודעה ואשמח לעזור.'},
  {id:uid(),kind:'private',title:'הודעה בפרטי (DM)',body:'היי 🙂 ראיתי את הפוסט שלך על ניהול הוועד. אני גזבר בעצמי ובניתי כלי בשם VeriBayit שמתחבר לדף הבנק ומזהה לבד מי שילם (הכסף נשאר בחשבון הוועד, בלי עמלות סליקה). יש דמו חינם ל-3 ימים בלי כרטיס אשראי — רוצה שאשלח קישור?'},
  {id:uid(),kind:'private',title:'📩 פרטי + דמו ⭐',body:'היי 🙂 ראיתי שכתבת על הקושי בניהול הוועד, אז כמו שהבטחתי — הכלי שבניתי נקרא VeriBayit. הוא מתחבר לדף הבנק ומזהה לבד מי שילם, והכסף נשאר בחשבון הוועד (בלי גורם שלישי ובלי עמלות סליקה).\nאפשר פשוט לנסות בדמו חינם ל-3 ימים, בלי כרטיס אשראי 👇\nhttps://www.veribayit.com/demo\nאם יהיו שאלות — אני כאן 🙏'},
  {id:uid(),kind:'private',title:'📩 פרטי — סיפור מייסד',body:'היי 🙂 אני עמית, גזבר בבניין של 70 דירות. נמאס לי מהרדיפה החודשית, אז בניתי כלי שעושה את זה לבד — מתחבר לדף הבנק ומזהה מי שילם.\nתרגיש/י חופשי להתרשם: https://www.veribayit.com (יש גם דמו חינם 3 ימים).\nשמח לעזור בכל שאלה, בלי שום התחייבות 🙏'},
  {id:uid(),kind:'private',title:'📩 פרטי + ליווי',body:'נעים מאוד 🙂 כמו שכתבתי בקבוצה — VeriBayit פותרת בדיוק את הרדיפה אחרי התשלומים: במקום אקסל, היא קוראת את דף הבנק ומזהה אוטומטית מי שילם.\nהאתר: https://www.veribayit.com · דמו חינם 3 ימים (בלי כרטיס אשראי).\nאם בא לך, אשמח גם להראות לך איך זה עובד בשיחה קצרה — מה שנוח לך 🙏'}
].concat([...PERSONAL_DM,...SOCIAL_PROOF].map(t=>({id:uid(),...t})));}
function newProject(name,emoji,seed){
  return {id:'p_'+uid(),name:name,emoji:emoji||'📁',
    groups:[],keywords:seed?DEFAULT_KEYWORDS.slice():[],templates:seed?vbReplies():[],
    posts:[],leads:[],drafts:[]};
}
function freshState(){
  const vb=newProject('VeriBayit','🏠',true);vb.id='p_vb';
  return {activeProjectId:'p_vb',projects:[vb],meta:{lastReset:todayStr(),activeTab:'dash'}};
}

// רעיונות-פתיחה לסטודיו (מסגרות תוכן גנריות)
const POST_STARTERS=[
  {label:'סיפור אישי',skel:'לפני כמה חודשים קרה לי משהו שלא ציפיתי לו.\n\n[תאר את הרגע / השיחה]\n\nוזה מה שזה גרם לי להבין:\n\n[התובנה + איך זה מתחבר למוצר]\n\nנשמח שתכירו 👇'},
  {label:'בעיה → פתרון',skel:'אתם מכירים את התחושה ש...?\n\n[תאר את הכאב בצורה שכולם מזדהים]\n\nבדיוק בשביל זה יצרתי...\n\n[הפתרון, קצר וברור]\n\n[קריאה לפעולה עדינה]'},
  {label:'לפני / אחרי',skel:'פעם זה לקח לי שעות. היום זה לוקח דקות.\n\nלפני: [המצב הישן]\n\nאחרי: [המצב החדש עם המוצר]\n\n[CTA]'},
  {label:'טיפ מקצועי',skel:'טיפ לכל מי שמנהל ועד בית 👇\n\n[הטיפ — שווה ערך גם בלי המוצר]\n\nואם בא לכם לעשות את זה אוטומטית — [הקשר עדין].'},
  {label:'שאלה לקהילה',skel:'שאלה לכל הגזברים בקבוצה:\n\n[שאלה שמעוררת תגובות — איך אתם מנהלים את X?]\n\n[הקשר קצר + הזמנה לשתף]'},
];

// קמפיין טפטוף — פוסט אחד לכל תמונה, כל כמה ימים. נטענים כטיוטות מוכנות לפרויקט VeriBayit.
const CAMPAIGN_POSTS=[
  {title:'קמפיין 1 · אקסל — הכאב', body:`😩 עדיין מנהלים את ועד הבית באקסל ובפתקים?

מי שילם, מי לא, וכמה נשאר בקופה — בלאגן שחוזר כל חודש.
יש דרך אחרת. 👇

🌐 veribayit.com
#ועד_בית #ניהול_בניין`},
  {title:'קמפיין 2 · בנק — היתרון הגדול', body:`🏦 תכירו את הפיצ׳ר שמשנה הכל:

VeriBayit מתחברת לדף הבנק ומזהה לבד כל תשלום — מי שילם, כמה, ולמי.
בלי להזין ידנית. בלי לפספס.

// אם לתגובה אין kind (נתונים ישנים) — מסיקים: 📩 / "פרטי" / DM → private, אחרת public.
function inferKind(t){return /📩|בפרטי|\bDM\b/.test(t.title||'')?'private':'public';}
function normalize(st){
  (st.projects||[]).forEach(p=>(p.templates||[]).forEach(t=>{if(!t.kind)t.kind=inferKind(t);}));
  return st;
}
// מיגרציות חד-פעמיות — רצות פעם אחת ומסומנות ב-meta.migrations.
// כך תגובות חדשות מגיעות לנתונים קיימים, אבל מה שמחקת/ערכת — נשאר.
const MIGRATIONS={
  personalDM_v1(st){
    const vb=(st.projects||[]).find(p=>p.id==='p_vb'); if(!vb)return;
    if(!vb.templates)vb.templates=[];
    const have=new Set(vb.templates.map(t=>t.title));
    PERSONAL_DM.forEach(t=>{ if(!have.has(t.title)) vb.templates.push({id:uid(),...t}); });
  },
  socialProof_v1(st){
    const vb=(st.projects||[]).find(p=>p.id==='p_vb'); if(!vb)return;
    if(!vb.templates)vb.templates=[];
    const have=new Set(vb.templates.map(t=>t.title));
    SOCIAL_PROOF.forEach(t=>{ if(!have.has(t.title)) vb.templates.push({id:uid(),...t}); });
  },
  campaignDrip_v1(st){
    const vb=(st.projects||[]).find(p=>p.id==='p_vb'); if(!vb)return;
    if(!Array.isArray(vb.drafts))vb.drafts=[];
    const have=new Set(vb.drafts.map(d=>d.title));
    CAMPAIGN_POSTS.forEach(p=>{ if(!have.has(p.title)) vb.drafts.push({id:uid(),title:p.title,body:p.body,status:'draft',date:todayStr()}); });
  }
};
function applyMigrations(st){
  if(!st.meta) st.meta={lastReset:todayStr(),activeTab:'dash'};
  if(!Array.isArray(st.meta.migrations)) st.meta.migrations=[];
  Object.keys(MIGRATIONS).forEach(k=>{ if(!st.meta.migrations.includes(k)){ try{MIGRATIONS[k](st);}catch(e){} st.meta.migrations.push(k); } });
  return st;
}
function prep(st){ return applyMigrations(normalize(st)); }

  let r=null;try{r=JSON.parse(localStorage.getItem(KEY));}catch(e){}

  // מיגרציה מ-v1 (מבנה שטוח) → פרויקט VeriBayit

    groups:r.groups||[],keywords:r.keywords||DEFAULT_KEYWORDS.slice(),
    templates:r.templates||vbReplies(),posts:r.posts||[],leads:r.leads||[],drafts:[]};
  return prep({activeProjectId:'p_vb',projects:[vb],meta:r.meta||{lastReset:todayStr(),activeTab:'dash'}});
}

async function uploadMedia(file){
  if(!window.__sb||!cloudUser){ toast('התחבר קודם'); return; }
  const kind=file.type.startsWith('video')?'video':'image';
  const safe=file.name.replace(/[^\w.\-]+/g,'_');
  const path=cloudUser.id+'/'+Date.now()+'_'+safe;
  toast('מעלה…');
  try{
    const { error:upErr }=await window.__sb.storage.from('media').upload(path,file,{upsert:false});
    if(upErr){ toast('העלאה נכשלה: '+upErr.message); return; }
    const url=window.__sb.storage.from('media').getPublicUrl(path).data.publicUrl;
    await window.__sb.from('media_assets').insert({owner:cloudUser.id,kind,path,url,name:file.name,tag:'',description:''});
    await fetchMedia(); render(); toast('הועלה ✓');
  }catch(e){ toast('שגיאה בהעלאה'); }
}

function normUrl(u){return (u||'').trim().replace(/\/+$/,'');}

function copyText(t){
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(t).then(()=>toast('הועתק ללוח ✓')).catch(()=>fallbackCopy(t));
  else fallbackCopy(t);
}
function fallbackCopy(t){
  const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('הועתק ללוח ✓');}catch(e){toast('העתקה נכשלה — סמן ידנית');}
  document.body.removeChild(ta);
}
function toast(m){
  const t=document.createElement('div');t.textContent=m;
  t.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--success);color:#06122a;padding:10px 18px;border-radius:10px;font-weight:700;z-index:99;box-shadow:0 6px 20px rgba(0,0,0,.4)';
  document.body.appendChild(t);setTimeout(()=>t.remove(),1700);
}

function showForm(title,fields,values,onSubmit){
  const v=values||{};
  const inputs=fields.map(f=>{
    const val=v[f.key]!=null?v[f.key]:(f.def||'');
    if(f.type==='textarea')return `<label class="fl">${f.label}</label><textarea data-k="${f.key}" ${f.rows?`style="min-height:${f.rows*22}px"`:''}>${esc(val)}</textarea>`;
    if(f.type==='select'){const opts=f.options.map(o=>`<option value="${o.v}" ${o.v===val?'selected':''}>${o.l}</option>`).join('');
      return `<label class="fl">${f.label}</label><select data-k="${f.key}">${opts}</select>`;}
    return `<label class="fl">${f.label}</label><input data-k="${f.key}" type="${f.type||'text'}" value="${esc(val)}" placeholder="${f.ph||''}">`;
  }).join('');
  document.getElementById('modal').innerHTML=`
    <div class="row spread"><h3>${esc(title)}</h3><button class="x" onclick="closeModal()">&times;</button></div>
    ${inputs}<div class="hr"></div>
    <div class="row spread"><button class="btn ghost" onclick="closeModal()">ביטול</button><button class="btn" id="frmSave">שמירה</button></div>`;
  document.getElementById('ov').classList.add('on');
  document.getElementById('frmSave').onclick=()=>{const obj={};document.querySelectorAll('#modal [data-k]').forEach(el=>obj[el.dataset.k]=el.value.trim());onSubmit(obj);closeModal();};
}

let groupSort='priority';
function vGroups(){
  const p=P();
  const quick='';  // פאנל "תגובות מהירות" הוסר
  if(!p.groups.length) return quick+`
    <div class="row spread"><b>הקבוצות של ${esc(p.name)}</b><button class="btn" onclick="editGroup()">➕ הוסף קבוצה</button></div>

  let arr=[...p.groups];
  if(groupSort==='priority')arr.sort((a,b)=>prioVal(b)-prioVal(a));
  else arr.sort((a,b)=>(a.lastChecked||'').localeCompare(b.lastChecked||''));
  const cards=arr.map(g=>{

// ---- ייבוא פוסט ידני (הדבקה מהסוכן) ----
function importInboxPost(){
  if(!cloudUser){ toast('התחבר קודם'); return; }
  const imgOpts=[{v:'',l:'— בלי תמונה —'}].concat(
    mediaAssets.filter(m=>m.kind==='image').map(m=>({v:m.url,l:(m.tag||m.name||'תמונה')})));
  showForm('➕ ייבוא פוסט מהסוכן',[
    {key:'body',label:'תוכן הפוסט (הדבק מהסוכן)',type:'textarea',rows:10},
    {key:'image',label:'תמונה מהמאגר',type:'select',options:imgOpts},
    {key:'title',label:'כותרת לזיהוי (אופציונלי)',ph:'נושא 2 — בנק'},
    {key:'angle',label:'זווית (אופציונלי)',ph:'יתרון'}
  ],{},async o=>{
    if(!o.body){ toast('צריך תוכן פוסט'); return; }
    const sel=mediaAssets.find(m=>m.url===o.image);
    try{
      await window.__sb.from('pending_posts').insert({owner:cloudUser.id,body:o.body,
        title:o.title||null,angle:o.angle||null,image_url:o.image||null,
        image_hint:sel?(sel.tag||null):null,status:'pending'});
      await fetchPending(); render(); toast('נוסף לתיבת הנכנס ✓');
    }catch(e){ toast('שגיאה בהוספה'); }
  });
}

function vInbox(){
  if(!cloudUser) return `<div class="card empty small">📥 התחבר לסנכרון (☁️ למעלה) כדי לראות פוסטים שהסוכן שלח אוטומטית.</div>`;
  const pend=pendingPosts.filter(x=>x.status==='pending');
  const pub=pendingPosts.filter(x=>x.status==='published');
  let h=`<div class="card"><div class="row spread"><b>📥 פוסטים נכנסים מהסוכן (${pend.length})</b>
    <div class="row" style="gap:6px"><button class="btn sm" onclick="importInboxPost()">➕ ייבוא פוסט</button>
      <button class="btn sm ghost" onclick="refreshInbox()">↻ בדוק</button></div></div>`;
  h += pend.length

    </div>
    <div class="card empty small">💡 כל שקופית ניתנת להורדה בנפרד, או "הורד את כל הקרוסלה" / "הורד את כל הסטורי" בבת אחת.</div>
    ${vMediaLib()}`;
}
// ---- תצוגה מוגדלת (lightbox) ----
function openLightbox(url){
  let lb=document.getElementById('lightbox');
  if(!lb){
    lb=document.createElement('div'); lb.id='lightbox';
    lb.style.cssText='display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out;padding:20px';
    lb.onclick=()=>{ lb.style.display='none'; lb.innerHTML=''; };
    document.body.appendChild(lb);
  }
  lb.innerHTML='<img src="'+url+'" style="max-width:94vw;max-height:94vh;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.6)"><span style="position:absolute;top:14px;left:22px;color:#fff;font-size:42px;line-height:1">&times;</span>';
  lb.style.display='flex';
}
// ---- מאגר מדיה: תמונות + סרטונים ----
function vMediaLib(){
  if(!cloudUser) return `<div class="card empty small">🗂️ התחבר לסנכרון (☁️ למעלה) כדי להעלות ולנהל תמונות/סרטונים.</div>`;
  const imgs=mediaAssets.filter(m=>m.kind==='image');
  const vids=mediaAssets.filter(m=>m.kind==='video');
  return `<div class="card">
    <div class="row spread"><b>🗂️ מאגר מדיה (${mediaAssets.length})</b>
      <label class="btn sm" style="cursor:pointer">⬆️ העלה קובץ<input type="file" accept="image/*,video/*" style="display:none" onchange="onMediaPick(this)"></label></div>
    <div class="muted small" style="margin:6px 0 10px">תמונות וסרטונים לשימוש בפוסטים. תן לכל תמונה <b>תגית</b> קצרה (למשל "חיבור בנק") — לפיה הסוכן יבחר תמונה לפוסט השבועי.</div>
    ${imgs.length?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px">${imgs.map(mediaCard).join('')}</div>`:'<div class="muted small">אין תמונות עדיין — לחץ "העלה קובץ".</div>'}
    ${vids.length?`<div style="margin-top:16px"><b class="small">🎬 סרטונים (${vids.length})</b>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:8px">${vids.map(mediaCard).join('')}</div></div>`:''}
  </div>`;
}
function mediaCard(m){
  const media = m.kind==='video'
    ? `<video src="${esc(m.url)}" controls preload="metadata" style="width:100%;border-radius:8px;background:#000"></video>`
    : `<img src="${esc(m.url)}" loading="lazy" onclick="openLightbox('${esc(m.url)}')" style="width:100%;height:120px;object-fit:cover;border-radius:8px;background:#000;cursor:zoom-in">`;
  return `<div style="border:1px solid var(--border);border-radius:10px;padding:8px">
    ${media}
    <input type="text" placeholder="תגית (למשל: חיבור בנק)" value="${esc(m.tag||'')}" onchange="setMediaField('${m.id}','tag',this.value)" style="margin-top:6px;font-size:12px;width:100%">
    <div class="row" style="gap:6px;margin-top:6px">
      <button class="btn sm ghost" onclick="copyText('${esc(m.url)}')">📋 קישור</button>
      <button class="btn sm danger-o" onclick="delMedia('${m.id}','${esc(m.path)}')">🗑️</button>
    </div></div>`;
}

// ---- הגדרות וגיבוי ----
function vBackup(){
  const p=P();
  const tags=p.keywords.map((k,i)=>`<span class="chip">${esc(k)}<span class="tag-x" onclick="delKw(${i})">×</span></span>`).join(' ');
  const pjs=state.projects.map(x=>`<div class="row spread list-item"><b>${esc(x.emoji)} ${esc(x.name)}</b>
      <div class="row" style="gap:6px"><button class="btn sm ghost" onclick="editProject('${x.id}')">✏️</button>
      <button class="btn sm danger-o" onclick="delProject('${x.id}')">🗑️</button></div></div>`).join('');
  return `
    <div class="card"><b>📁 פרויקטים</b>
      <div class="muted small" style="margin:6px 0 10px">כל פרויקט מחזיק קבוצות/תגובות/לידים משלו. לחיצה על פרויקט בבר העליון מחליפה הקשר.</div>
      ${pjs}<button class="btn" style="margin-top:8px" onclick="addProject()">➕ פרויקט חדש</button></div>
    <div class="card"><b>🔍 מילות חיפוש — ${esc(p.name)}</b>
      <div class="muted small" style="margin:6px 0 10px">מופיעות ככפתורי חיפוש בכל קבוצה של הפרויקט הזה.</div>
      <div class="row" style="gap:6px">${tags||'<span class="muted small">אין עדיין</span>'}</div>
      <div class="row" style="margin-top:12px;gap:6px"><input id="newKw" placeholder="מילת חיפוש חדשה" style="max-width:240px" onkeydown="if(event.key==='Enter')addKw()"><button class="btn" onclick="addKw()">הוסף</button></div></div>
    <div class="card"><b>💾 גיבוי ושחזור (כל הפרויקטים)</b>
      <div class="muted small" style="margin:6px 0 12px">הנתונים נשמרים רק בדפדפן הזה. ייצא גיבוי כדי לא לאבד / להעביר למכשיר אחר.</div>
      <div class="row" style="gap:8px"><button class="btn" onclick="exportData()">⬇️ ייצוא גיבוי</button>
        <button class="btn ghost" onclick="document.getElementById('imp').click()">⬆️ ייבוא גיבוי</button>
        <input type="file" id="imp" accept="application/json" style="display:none" onchange="importData(this)"></div></div>`;
}
function addKw(){const el=document.getElementById('newKw');const v=el.value.trim();const p=P();if(v&&!p.keywords.includes(v)){p.keywords.push(v);save();render();}}
function delKw(i){P().keywords.splice(i,1);save();render();}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='outreach-backup-'+todayStr()+'.json';a.click();URL.revokeObjectURL(a.href);}
function importData(inp){
  const f=inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{
    const d=JSON.parse(r.result);
    if(d.projects&&d.projects.length){ state=d; }                 // גיבוי v2
    else if(d.groups){ localStorage.setItem(KEY,r.result); state=load(); } // גיבוי v1 → מיגרציה
    else throw 0;
    save();render();toast('יובא בהצלחה ✓');
  }catch(e){toast('קובץ לא תקין');}};
  r.readAsText(f);inp.value='';
}

// ---- כללי ----
function delItem(coll,id){if(confirm('למחוק?')){const p=P();p[coll]=p[coll].filter(x=>x.id!==id);save();render();}}
function go(t){state.meta.activeTab=t;save();render();}
document.getElementById('tabs').addEventListener('click',e=>{const b=e.target.closest('.tab');if(b)go(b.dataset.t);});
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeModal();});
render();
</script>
